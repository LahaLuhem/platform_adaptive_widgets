# Dependabot version updates.
# Reference: https://docs.github.com/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Bot PRs branch as `dependabot/...` and carry no `sem-*` label. The
# PR-convention and changelog workflows exempt `dependabot[bot]` from the
# branch-name, sem-label and changelog jobs (see
# .github/workflows/{pr-conventions,changelog}.yml), so these PRs land WITHOUT
# an automatic CHANGELOG entry — add one by hand if a root-package bump is
# user-visible. The commit-length / no-merge-commit gate still applies to them.
#
# Minor + patch bumps are grouped into one PR per ecosystem to cut noise; major
# bumps still arrive as individual PRs so they can be reviewed in isolation.
version: 2

updates:
  # --- Dart / Flutter: published library ---
  # Bumps the version constraints in the root pubspec.yaml. pub.dev packages
  # only — git / path deps are not eligible.
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pub:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # --- Dart / Flutter: example app ---
  - package-ecosystem: "pub"
    directory: "/example"
    schedule:
      interval: "weekly"
    groups:
      pub-example:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # --- Android / Gradle: example app ---
  # Covers the plugins/deps in the *.gradle.kts files AND the Gradle wrapper
  # version in gradle/wrapper/gradle-wrapper.properties
  # (dependabot-core#7124, shipped Feb 2026).
  - package-ecosystem: "gradle"
    directory: "/example/android"
    schedule:
      interval: "weekly"
    groups:
      gradle:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # --- GitHub Actions ---
  # `directory: "/"` scans everything under .github/ — the workflows and the
  # local composite action at .github/actions/setup-flutter.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
