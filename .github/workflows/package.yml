name: Package checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  # Pull-request runs cancel each other per PR; master-branch runs cancel only
  # against later master commits. The `|| github.ref` fallback keeps the group
  # well-formed on push events where `pull_request.number` is empty.
  group: pkg-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - run: flutter --no-version-check analyze lib

  deps:
    name: Dependency validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - run: dart pub global activate dependency_validator
      - run: dart pub global run dependency_validator

  test:
    name: Tests (AOT pruning guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - run: flutter --no-version-check test

  size-regression:
    name: AOT pruning size regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      # `flutter create` fills in the android/ scaffolding without touching
      # the checked-in pubspec.yaml or lib/main.dart (it skips existing
      # files unless --overwrite is passed). See tool/size_harness/.gitignore
      # for the full list of regenerated paths.
      - name: Generate Android scaffolding for size harness
        working-directory: tool/size_harness
        run: |
          flutter --no-version-check create \
            --platforms=android \
            --org=com.example.sizeharness \
            --project-name=size_harness \
            .
      - name: Resolve harness deps
        working-directory: tool/size_harness
        run: flutter --no-version-check pub get
      - name: Build release APK with size analysis
        working-directory: tool/size_harness
        run: |
          flutter --no-version-check build apk \
            --release \
            --analyze-size \
            --target-platform=android-arm64
      - name: Check size regression
        run: |
          json_file=$(ls -t "$HOME/.flutter-devtools/"apk-code-size-analysis_*.json | head -1)
          echo "Using $json_file"
          dart tool/check_size_regression.dart "$json_file"
