name: Example checks

on:
  pull_request:
    branches: [master]

concurrency:
  group: pr-${{ github.event.pull_request.number }}-example
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: example

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
        with:
          working-directory: example
      - run: flutter --no-version-check analyze .

  deps:
    name: Dependency validator (example)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
        with:
          working-directory: example
      - run: dart pub global activate dependency_validator
      - run: dart pub global run dependency_validator

  test:
    name: Widget tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
        with:
          working-directory: example
      - run: flutter --no-version-check test
